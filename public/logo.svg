<svg width="512" height="512" viewBox="0 0 512 512" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="logo-grad" x1="0" y1="0" x2="512" y2="512" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#4F46E5" />
      <stop offset="100%" stop-color="#0EA5E9" />
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur in="SourceAlpha" stdDeviation="12" />
      <feOffset dx="0" dy="8" />
      <feComponentTransfer>
        <feFuncA type="linear" slope="0.3" />
      </feComponentTransfer>
      <feMerge>
        <feMergeNode />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>
  </defs>

  <!-- Background Shape -->
  <rect x="64" y="64" width="384" height="384" rx="100" fill="white" filter="url(#shadow)" />
  <rect x="64" y="64" width="384" height="384" rx="100" fill="url(#logo-grad)" fill-opacity="0.05" />

  <!-- Stylized Icon -->
  <path d="M256 120L120 180L256 240L392 180L256 120Z" fill="url(#logo-grad)" />
  <path d="M140 200V300C140 300 200 340 256 340C312 340 372 300 372 300V200L256 260L140 200Z" fill="url(#logo-grad)" fill-opacity="0.8" />
  
  <!-- Network Node Detail -->
  <circle cx="256" cy="180" r="12" fill="white" />
  <circle cx="120" cy="180" r="8" fill="white" fill-opacity="0.5" />
  <circle cx="392" cy="180" r="8" fill="white" fill-opacity="0.5" />
  
  <!-- Connection Lines -->
  <path d="M256 260V380M256 380H310M256 380H202" stroke="url(#logo-grad)" stroke-width="24" stroke-linecap="round" />
  <circle cx="310" cy="380" r="16" fill="url(#logo-grad)" />
  <circle cx="202" cy="380" r="16" fill="url(#logo-grad)" />
</svg>